<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#6366F1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AquaTrack">
  <meta name="description" content="Умный трекер водного баланса">
  <link rel="manifest" href="manifest.json">
  <title>AquaTrack Pro — Трекер воды</title>
  <link rel="canonical" href="apps-variation-3.html">
  <script>
    window.location.href = 'apps-variation-3.html';
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #0F0A1F;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #6366F1 0%, #D946EF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: #A5A0B8;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(99, 102, 241, 0.3);
      border-top-color: #6366F1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #6366F1 0%, #D946EF 100%);
      color: #FFFFFF;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loader"></div>
    <h1>💧 AquaTrack Pro</h1>
    <p>Загрузка приложения...</p>
    <a href="apps-variation-3.html" class="btn">Открыть приложение</a>
  </div>
</body>
</html>
